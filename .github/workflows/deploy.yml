name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run Playwright E2E tests before deploy'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE: /robot-factory/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # `postinstall` runs `npm run build:pxt:install` automatically.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build PXT editor
        run: npm run build:pxt

      - name: Rebase PXT absolute URLs for non-root base
        if: env.VITE_BASE != '/' && env.VITE_BASE != ''
        run: |
          set -euo pipefail
          # PXT's `staticpkg --route /pxt-editor` bakes absolute `/pxt-editor/`
          # URLs into every HTML/JS/CSS/JSON/manifest file. When deployed under
          # a non-root base (e.g. GitHub Pages `/robot-factory/`), those URLs
          # 404. Rewrite them to `${VITE_BASE%/}/pxt-editor/`. Every match is
          # an intended URL prefix, so a blanket replace is safe.
          BASE_NO_SLASH="${VITE_BASE%/}"
          grep -rl '/pxt-editor/' public/pxt-editor \
            | xargs sed -i "s|/pxt-editor/|${BASE_NO_SLASH}/pxt-editor/|g"
          echo "Rebased /pxt-editor/ -> ${BASE_NO_SLASH}/pxt-editor/"

      - name: Unit tests
        run: npx vitest run

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        if: github.event.inputs.run_e2e == 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: github.event.inputs.run_e2e == 'true'
        run: npx playwright test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
